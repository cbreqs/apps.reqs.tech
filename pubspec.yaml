name: mogas
description: "MOgas MOmoney — Missouri Motor Fuel Tax Refund Tracker by REQS TECH"
publish_to: 'none'
version: 1.0.0+5   # versionName: 1.0.0  |  versionCode: 1  — increment versionCode (+1) for every Play Store upload

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4+2
  path: ^1.9.0

  # OCR & camera
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # PDF generation & printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"